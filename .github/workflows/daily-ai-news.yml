name: Daily AI News

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate daily article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: npm run news:update

      - name: Validate article data
        run: npm run validate:data

      - name: Commit updated article
        run: |
          git config user.name "ai-koyomi-bot"
          git config user.email "ai-koyomi-bot@users.noreply.github.com"
          git add public/data/articles.json
          if git diff --cached --quiet; then
            echo "No article changes."
          else
            git commit -m "Update daily AI news"
            git push
          fi
